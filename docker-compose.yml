version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: minitransfer-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: minitransfer-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB=minitransfer
      - JWT_SECRET=MySuperSecretKeyForMiniTransferProject2026
      - JWT_EXPIRATION=86400000
    restart: unless-stopped

volumes:
  mongo-data:
